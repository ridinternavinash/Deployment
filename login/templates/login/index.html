{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-900 via-purple-900 to-black relative overflow-hidden">

    <!-- Glow Background -->
    <div class="absolute w-[500px] h-[500px] bg-cyan-400 opacity-20 blur-3xl animate-pulse top-[-100px] left-[-100px]"></div>
    <div class="absolute w-[400px] h-[400px] bg-purple-500 opacity-20 blur-3xl animate-pulse bottom-[-100px] right-[-100px]"></div>

    <div class="w-full max-w-5xl grid md:grid-cols-2 bg-white/10 backdrop-blur-xl rounded-2xl shadow-2xl overflow-hidden">

        <!-- LEFT SIDE -->
        <div class="hidden md:flex flex-col justify-center items-center text-white p-10 bg-gradient-to-br from-indigo-800 to-purple-900">

            <h1 class="text-4xl font-bold mb-4 bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">
                Welcome Back 👋
            </h1>

            <p class="text-gray-300 text-center">
                Login to continue your skill exchange journey and connect with amazing people.
            </p>

        </div>

        <!-- RIGHT SIDE (FORM) -->
        <div class="p-10 bg-white/90">

            <h2 class="text-3xl font-bold mb-6 text-center text-gray-800">
                Login
            </h2>

            <form method="POST" class="space-y-5">
                {% csrf_token %}

                <!-- Email -->
                <div>
                    <label class="block mb-1 text-gray-600">Email</label>
                    <input type="email" name="email" placeholder="Enter your email"
                        class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <!-- Password -->
                <div>
                    <label class="block mb-1 text-gray-600">Password</label>
                    <input type="password" name="password" placeholder="Enter your password"
                        class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <!-- Options -->
                <div class="flex justify-between items-center text-sm">
                    <label class="flex items-center gap-2">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="text-indigo-600 hover:underline">Forgot password?</a>
                </div>

                <!-- Button -->
                <button type="submit"
                    class="w-full py-3 rounded-lg bg-gradient-to-r from-cyan-400 to-indigo-500 text-white font-semibold hover:scale-105 transition duration-300">
                    Login
                </button>

                <!-- Divider -->
                <div class="text-center text-gray-500">or</div>

                <!-- Social Login -->
                <div class="flex gap-4">
                    <button class="w-full border py-2 rounded-lg hover:bg-gray-100 onclick="window.location.href='/accounts/google/login/'">Google</button>
                    <button class="w-full border py-2 rounded-lg hover:bg-gray-100">GitHub</button>
                </div>

                <!-- Signup -->
                <p class="text-center text-sm mt-4">
                    Don’t have an account?
                    <a href="{% url 'signup' %}" class="text-indigo-600 font-semibold hover:underline">
                        Sign up
                    </a>
                </p>

            </form>

        </div>

    </div>

</section>

{% endblock %}
