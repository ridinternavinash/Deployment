{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/signup.css' %}">
{% endblock %}

{% block content %}
<div class="signup-container">
  <h2>Create Account</h2>
  <form method="post">
      {% csrf_token %}
    <input type="text" placeholder="Full Name" name="name" required>
    <input type="email" placeholder="Email Address" name="email" required>
    <input type="tel" placeholder="Phone Number" name="number" required>

    <input type="date" name="date" required>

    <div class="gender">
      <label><input type="radio" name="gender" value="male"> Male</label>
      <label><input type="radio" name="gender" value="female"> Female</label>
      <label><input type="radio" name="gender" value="other"> Other</label>
    </div>

    <input type="text" placeholder="Username" name="username" required>

    <input type="password" placeholder="Password" name="pwd" required>
    <input type="password" placeholder="Confirm Password" name="pwd1" required>

    <textarea placeholder="Address" name="address"></textarea>

    <select name="country" required>
      <option value="">Select Country</option>
      <option value="india">India</option>
      <option value="usa">USA</option>
      <option value="uk">UK</option>
      <option value="other">Other</option>
    </select>

    <label>
      <input type="checkbox" name="agree" value="check" required> I agree to Terms & Conditions
    </label>

    <button type="submit">Sign Up</button>

  </form>

  <p>Already have an account? <a href="#">Login</a></p>
</div>
{% endblock %}
